<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MyCode | Stable GitHub Build</title>
    <style>
        :root { --bg: #000; --panel: #111; --accent: #58cc02; --text: #fff; --border: #333; --code: #00ff41; }
        * { box-sizing: border-box; font-family: 'Consolas', monospace; }
        body { margin: 0; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .toolbar { height: 50px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; font-size: 11px; color: #666; }
        main { display: flex; flex: 1; overflow: hidden; }
        #editor { flex: 1; background: transparent; color: var(--code); padding: 25px; font-size: 16px; border: none; outline: none; resize: none; border-right: 1px solid var(--border); line-height: 1.6; }
        #preview { flex: 1; background: #fff; color: #000; padding: 40px; overflow-y: auto; }
    </style>
    <style id="font-load-area"></style>
</head>
<body>

    <div class="toolbar">MYCODE ENGINE v10.7 // GITHUB_PAGES_STABLE // FONT_FIX_FINAL</div>

    <main>
        <textarea id="editor" spellcheck="false" oninput="compile()"></textarea>
        <div id="preview"></div>
    </main>

    <script>
        function compile() {
            const code = document.getElementById('editor').value;
            const preview = document.getElementById('preview');
            const fontArea = document.getElementById('font-load-area');
            
            let html = "";
            let cssImports = "";

            code.split('\n').forEach(line => {
                const t = line.trim();
                if (!t || t.startsWith('#')) return;

                // 1. Split Content from Meta (The Last Colon Method)
                const lastColon = t.lastIndexOf(':');
                if (lastColon === -1) return;
                const meta = t.substring(0, lastColon);
                const content = t.substring(lastColon + 1).trim();

                let style = "";
                let fontName = "sans-serif";

                // 2. Extract Styles
                if (meta.includes('!')) {
                    const styleString = meta.split('!')[1];
                    
                    // FONT EXTRACTION (Regex optimized for Black Ops One)
                    const fontMatch = styleString.match(/font=([^,!]+)/);
                    if (fontMatch) {
                        const fontUrl = fontMatch[1].trim();
                        cssImports += `@import url('${fontUrl}');\n`;
                        
                        // Extract family name from URL
                        let name = fontUrl.split('family=')[1]?.split('&')[0]?.split(':')[0]?.replace(/\+/g, ' ');
                        if (name) fontName = `'${name}'`;
                    }

                    // COLOR EXTRACTION
                    const colorMatch = styleString.match(/color=([^,!]+)/);
                    if (colorMatch) style += `color:${colorMatch[1]};`;
                }

                style += `font-family: ${fontName}, sans-serif;`;

                if (t.startsWith('@title')) html += `<h1 style="${style}">${content}</h1>`;
                if (t.startsWith('@text')) html += `<p style="${style}">${content}</p>`;
            });

            fontArea.innerHTML = cssImports;
            preview.innerHTML = html;
        }

        // Initialize with a CLEAN link
        document.getElementById('editor').value = "@title!font=https://fonts.googleapis.com/css2?family=Black+Ops+One:Hello Gemini";
        compile();
    </script>
</body>
</html>
