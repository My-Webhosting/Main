<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyWebHosting | Files</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            --glass-bg: #ffffff;
            --text-color: #2d3436;
            --accent-purple: #6c5ce7;
            --accent-blue: #0984e3;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--primary-gradient);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
        }

        .container {
            background: var(--glass-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
            width: 90%;
            max-width: 450px;
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
            color: #1e3c72;
            letter-spacing: -0.5px;
        }

        .subtitle {
            margin-top: 10px;
            margin-bottom: 30px;
            color: #636e72;
            font-size: 1rem;
            line-height: 1.5;
        }

        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        /* JackImage Studio Button */
        .btn-studio {
            background-color: var(--accent-purple);
            color: white;
        }

        .btn-studio:hover {
            background-color: #5849be;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.3);
        }

        /* Convert To It Button */
        .btn-convert {
            background-color: var(--accent-blue);
            color: white;
        }

        .btn-convert:hover {
            background-color: #0773c5;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(9, 132, 227, 0.3);
        }

        .footer {
            margin-top: 25px;
            font-size: 0.75rem;
            color: #b2bec3;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome</h1>
        <p class="subtitle">to the MyWebHosting files page</p>
        
        <div class="button-stack">
            <a href="https://my-webhosting.github.io/Main/Files/JIMGStudio" class="btn btn-studio">JackImage Studio</a>
            
            <a href="#" class="btn btn-convert">Convert To It (p2r3)</a>
        </div>

        <div class="footer">
            Secure File Management System
        </div>
    </div>

</body>
</html>
