<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyWeb | Ultimate Converter</title>
    
    <script src="./coi-serviceworker.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #ffffff; --card: #f8fafc; --txt: #0f172a; --accent: #2563eb; --border: #e2e8f0; --muted: #64748b; }
        [data-theme="dark"] { --bg: #0f172a; --card: #1e293b; --txt: #f8fafc; --accent: #3b82f6; --border: #334155; --muted: #94a3b8; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--txt); transition: 0.3s; min-height: 100vh; }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 8%; background: var(--bg); border-bottom: 1px solid var(--border); }
        .nav-brand { display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 1.2rem; }
        .nav-brand img { height: 34px; }

        .wrapper { max-width: 650px; margin: 60px auto; padding: 0 20px; }
        .main-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        
        /* THE CLICKABLE ZONE - High Z-Index to prevent blocking */
        .upload-zone { 
            border: 2px dashed var(--border); 
            border-radius: 16px; 
            padding: 60px 20px; 
            text-align: center; 
            cursor: pointer; 
            background: var(--bg);
            position: relative;
            z-index: 10;
        }
        
        /* Transparent file input that covers the whole box */
        #fileInput {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
        }

        .control-group { margin-top: 30px; display: none; }
        select { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--txt); font-weight: 600; margin-bottom: 20px; appearance: none; }
        .btn { width: 100%; padding: 18px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; background: var(--accent); color: white; }
        
        .console { background: #000; color: #10b981; padding: 20px; border-radius: 12px; font-family: monospace; font-size: 0.8rem; margin-top: 20px; display: none; }
    </style>
</head>
<body>

<nav>
    <div class="nav-brand"><img src="MYWEB2!.png"> <span>MyWebHosting</span></div>
    <button id="theme-toggle" style="background:none; border:none; cursor:pointer; font-size:1.5rem;">🌓</button>
</nav>

<div class="wrapper">
    <div class="main-card">
        <div class="upload-zone">
            <p id="status-text" style="font-weight: 800;">CLICK OR DRAG FILE HERE</p>
            <input type="file" id="fileInput">
        </div>

        <div id="settings" class="control-group">
            <label style="font-size: 0.7rem; font-weight: 800; color: var(--muted); margin-bottom: 8px; display: block;">TARGET FORMAT</label>
            <select id="format-select"></select>
            <button id="convert-btn" class="btn">Start Conversion</button>
        </div>

        <div id="log-box" class="console"></div>
    </div>
</div>

<script>
    const themeBtn = document.getElementById('theme-toggle');
    themeBtn.addEventListener('click', () => {
        const doc = document.documentElement;
        const newTheme = doc.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        doc.setAttribute('data-theme', newTheme);
    });

    const fileIn = document.getElementById('fileInput');
    fileIn.addEventListener('change', (e) => {
        if(e.target.files[0]) {
            document.getElementById('status-text').innerText = "READY: " + e.target.files[0].name.toUpperCase();
            document.getElementById('settings').style.display = 'block';
            window.setupFormats(e.target.files[0]);
        }
    });
</script>

<script type="module">
    import { initializeImageMagick, ImageMagick, MagickFormat } from 'https://cdn.jsdelivr.net/npm/@imagemagick/magick-wasm@0.0.30/dist/index.mjs';
    import { createFFmpeg, fetchFile } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js';

    const library = {
        image: ["png", "jpg", "webp", "gif", "ico", "bmp"],
        video: ["mp4", "webm", "avi", "mov", "mp3"],
        audio: ["mp3", "wav", "ogg", "flac"]
    };

    let activeFile = null;

    window.setupFormats = (file) => {
        activeFile = file;
        const type = file.type.split('/')[0] || 'image';
        const list = library[type] || library.image;
        const sel = document.getElementById('format-select');
        sel.innerHTML = list.map(f => `<option value="${f}">${f.toUpperCase()}</option>`).join('');
    };

    document.getElementById('convert-btn').onclick = async () => {
        const target = document.getElementById('format-select').value;
        const log = document.getElementById('log-box');
        log.style.display = 'block';
        log.innerHTML = `> STARTING...`;

        try {
            if (activeFile.type.startsWith('image')) {
                await initializeImageMagick();
                const bytes = new Uint8Array(await activeFile.arrayBuffer());
                ImageMagick.read(bytes, (img) => {
                    img.write(data => {
                        save(new Blob([data]), `out.${target}`);
                        log.innerHTML += `<br>> SUCCESS.`;
                    }, MagickFormat[target.charAt(0).toUpperCase() + target.slice(1).replace('jpg', 'Jpeg')]);
                });
            } else {
                const ffmpeg = createFFmpeg({ log: true });
                await ffmpeg.load();
                ffmpeg.FS('writeFile', 'input', await fetchFile(activeFile));
                await ffmpeg.run('-i', 'input', `output.${target}`);
                const data = ffmpeg.FS('readFile', `output.${target}`);
                save(new Blob([data.buffer]), `out.${target}`);
                log.innerHTML += `<br>> SUCCESS.`;
            }
        } catch (e) {
            log.innerHTML += `<br>> ERROR: ${e.message}`;
        }
    };

    function save(blob, name) {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = name;
        a.click();
    }
</script>
</body>
</html>
