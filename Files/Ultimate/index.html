<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyWeb | Ultimate Converter</title>
    
    <script src="./coi-serviceworker.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #ffffff; --card: #f8fafc; --txt: #000000; --accent: #2563eb; --border: #e2e8f0; }
        [data-theme="dark"] { --bg: #000000; --card: #0a0a0a; --txt: #ffffff; --accent: #3b82f6; --border: #1a1a1a; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--txt); transition: 0.2s; min-height: 100vh; overflow-x: hidden; }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 8%; background: var(--bg); border-bottom: 1px solid var(--border); }
        .nav-brand { display: flex; align-items: center; gap: 12px; font-weight: 900; font-size: 1.3rem; }
        .nav-brand img { height: 32px; }

        .wrapper { max-width: 600px; margin: 60px auto; padding: 0 20px; }
        .main-card { background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); position: relative; }
        
        .upload-zone { border: 2px dashed var(--border); border-radius: 20px; padding: 60px 20px; text-align: center; cursor: pointer; position: relative; background: var(--bg); transition: 0.2s; }
        .upload-zone:hover { border-color: var(--accent); }
        #fileInput { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; z-index: 50; }

        .settings-area { margin-top: 30px; display: none; }
        label { display: block; font-size: 0.7rem; font-weight: 900; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
        
        select { width: 100%; padding: 18px; border-radius: 14px; border: 1px solid var(--border); background: var(--bg); color: var(--txt); font-weight: 700; margin-bottom: 20px; outline: none; appearance: none; cursor: pointer; }

        .btn-convert { width: 100%; padding: 20px; border-radius: 14px; font-weight: 900; cursor: pointer; border: none; background: var(--accent); color: white; text-transform: uppercase; letter-spacing: 1px; }
        
        .console { background: #000; color: #4ade80; padding: 20px; border-radius: 14px; font-family: monospace; font-size: 0.8rem; margin-top: 20px; display: none; border: 1px solid #222; max-height: 150px; overflow-y: auto; }

        .version-tag { width: 100%; text-align: center; font-size: 0.6rem; font-weight: 800; color: #444; text-transform: uppercase; letter-spacing: 2px; margin-top: 25px; }
    </style>
</head>
<body>

<nav>
    <div class="nav-brand"><img id="logo" src="MYWEB2!.png"> <span>MyWebHosting</span></div>
    <button id="theme-toggle" style="background:none; border:none; cursor:pointer; font-size:1.6rem;">🌓</button>
</nav>

<div class="wrapper">
    <div class="main-card">
        <div class="upload-zone">
            <h2 id="status-text" style="font-weight: 900;">DROP OR CLICK</h2>
            <p style="opacity: 0.5; font-size: 0.75rem; margin-top: 5px;">Images • Video • Audio</p>
            <input type="file" id="fileInput">
        </div>

        <div id="settings" class="settings-area">
            <label>Output Format</label>
            <select id="format-select"></select>
            <button id="convert-btn" class="btn-convert">Initiate Export</button>
        </div>

        <div id="log-box" class="console"></div>
    </div>
    <div class="version-tag">STABLE v1.5.5 | MYWEB CLOUD</div>
</div>

<script type="module">
    // IMPORT ENGINES
    import { initializeImageMagick, ImageMagick, MagickFormat } from 'https://cdn.jsdelivr.net/npm/@imagemagick/magick-wasm@0.0.30/dist/index.mjs';
    import { createFFmpeg, fetchFile } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js';

    const library = {
        image: ["png", "jpg", "webp", "gif", "ico", "bmp", "tiff"],
        video: ["mp4", "webm", "avi", "mov", "gif"],
        audio: ["mp3", "wav", "ogg", "flac"]
    };

    let activeFile = null;

    // --- UI LOGIC ---
    const themeBtn = document.getElementById('theme-toggle');
    const logoImg = document.getElementById('logo');
    
    themeBtn.onclick = () => {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        const next = isDark ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        logoImg.src = (next === 'light') ? 'MYWEB!.png' : 'MYWEB2!.png';
    };

    // --- FILE HANDLING ---
    const fileIn = document.getElementById('fileInput');
    fileIn.onchange = (e) => {
        activeFile = e.target.files[0];
        if(!activeFile) return;

        const ext = activeFile.name.split('.').pop().toLowerCase();
        let cat = 'image';
        
        // Manual categorization check
        if(["mp4", "webm", "avi", "mov", "mkv"].includes(ext)) cat = 'video';
        else if(["mp3", "wav", "ogg", "flac", "m4a"].includes(ext)) cat = 'audio';

        document.getElementById('status-text').innerText = activeFile.name.toUpperCase();
        document.getElementById('settings').style.display = 'block';

        const sel = document.getElementById('format-select');
        const list = library[cat];
        
        sel.innerHTML = list
            .filter(f => f !== ext)
            .map(f => `<option value="${f}">${f.toUpperCase()}</option>`)
            .join('');
            
        if(sel.innerHTML === "") sel.innerHTML = `<option>N/A</option>`;
    };

    // --- EXECUTION ---
    document.getElementById('convert-btn').onclick = async () => {
        const target = document.getElementById('format-select').value;
        const log = document.getElementById('log-box');
        log.style.display = 'block';
        log.innerHTML = `> MOUNTING CORE...`;

        try {
            const ext = activeFile.name.split('.').pop().toLowerCase();
            const isImg = library.image.includes(target) && !library.video.includes(ext);

            if(isImg) {
                await initializeImageMagick();
                const bytes = new Uint8Array(await activeFile.arrayBuffer());
                const fKey = target.charAt(0).toUpperCase() + target.slice(1).replace('jpg', 'Jpeg');
                
                ImageMagick.read(bytes, (img) => {
                    img.write(data => {
                        download(new Blob([data]), `myweb_${target}.${target}`);
                        log.innerHTML += `<br>> IMAGE_RENDER_COMPLETE`;
                    }, MagickFormat[fKey] || MagickFormat.Png);
                });
            } else {
                const ffmpeg = createFFmpeg({ log: true });
                await ffmpeg.load();
                ffmpeg.FS('writeFile', 'in', await fetchFile(activeFile));
                await ffmpeg.run('-i', 'in', `out.${target}`);
                const data = ffmpeg.FS('readFile', `out.${target}`);
                download(new Blob([data.buffer]), `myweb_${target}.${target}`);
                log.innerHTML += `<br>> MEDIA_EXPORT_COMPLETE`;
            }
        } catch (err) {
            log.innerHTML += `<br>> ERROR: ${err.message}`;
        }
    };

    function download(blob, name) {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = name;
        a.click();
    }
</script>
</body>
</html>
