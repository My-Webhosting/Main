<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyWeb | Ultimate Converter</title>
    
    <script src="./coi-serviceworker.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    
    <style>
        /* FIXED LIGHT/DARK VARIABLES */
        :root { 
            --bg: #ffffff; 
            --card: #f8fafc; 
            --txt: #0f172a; 
            --accent: #2563eb; 
            --border: #e2e8f0; 
            --muted: #64748b; 
        }
        [data-theme="dark"] { 
            --bg: #0f172a; 
            --card: #1e293b; 
            --txt: #f8fafc; 
            --accent: #3b82f6; 
            --border: #334155; 
            --muted: #94a3b8; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--txt); transition: background 0.3s, color 0.3s; line-height: 1.6; min-height: 100vh; }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 8%; background: var(--bg); border-bottom: 1px solid var(--border); }
        .nav-brand { display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 1.2rem; }
        .nav-brand img { height: 34px; }

        .wrapper { max-width: 700px; margin: 60px auto; padding: 0 20px; }
        .hero { text-align: center; margin-bottom: 30px; }
        .hero h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 8px; color: var(--txt); }

        .main-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        /* THE CLICKABLE ZONE */
        .upload-box { 
            border: 2px dashed var(--border); 
            border-radius: 12px; 
            padding: 50px 20px; 
            text-align: center; 
            cursor: pointer; 
            background: var(--bg);
            transition: 0.2s;
            position: relative;
        }
        .upload-box:hover { border-color: var(--accent); }
        
        .control-group { margin-top: 25px; display: none; }
        label { display: block; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
        
        select { 
            width: 100%; 
            padding: 14px; 
            border-radius: 10px; 
            border: 1px solid var(--border); 
            background: var(--bg); 
            color: var(--txt); 
            font-weight: 600; 
            margin-bottom: 20px;
        }

        .btn { width: 100%; padding: 16px; border-radius: 10px; font-weight: 700; cursor: pointer; border: none; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        
        .console { 
            background: #000; 
            color: #10b981; 
            padding: 20px; 
            border-radius: 10px; 
            font-family: monospace; 
            font-size: 0.8rem; 
            margin-top: 20px; 
            display: none; 
            max-height: 200px;
            overflow-y: auto;
        }

        .version-tag { position: fixed; bottom: 15px; right: 15px; font-size: 0.65rem; font-weight: 800; color: var(--muted); }
    </style>
</head>
<body>

<nav>
    <div class="nav-brand">
        <img src="MYWEB2!.png" alt="Logo">
        <span>MyWebHosting</span>
    </div>
    <button id="theme-toggle" style="background:none; border:none; cursor:pointer; font-size:1.4rem;">🌓</button>
</nav>

<div class="wrapper">
    <div class="hero">
        <h1>Ultimate Converter</h1>
    </div>

    <div class="main-card">
        <div id="drop-zone" class="upload-box">
            <p id="status-text" style="font-weight: 700;">Click to Open File Browser</p>
            <input type="file" id="fileInput" style="display: none;">
        </div>

        <div id="settings" class="control-group">
            <label>Output Format</label>
            <select id="format-select"></select>
            <button id="convert-btn" class="btn btn-primary">Start Conversion</button>
        </div>

        <div id="log-box" class="console"></div>
    </div>
</div>

<div class="version-tag">STABLE v1.5.1 | MYWEB</div>

<script type="module">
    // Direct Import to ensure Magick is ready
    import { initializeImageMagick, ImageMagick, MagickFormat } from 'https://cdn.jsdelivr.net/npm/@imagemagick/magick-wasm@0.0.30/dist/index.mjs';

    const formats = {
        image: ["png", "jpg", "webp", "gif", "ico", "bmp", "pdf"],
        video: ["mp4", "webm", "avi", "mov", "mp3", "gif"],
        audio: ["mp3", "wav", "ogg", "flac"],
        docs: ["docx", "odt", "html", "txt", "pdf"]
    };

    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: true, corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js' });

    const dz = document.getElementById('drop-zone');
    const fi = document.getElementById('fileInput');
    const themeBtn = document.getElementById('theme-toggle');

    let activeFile = null;
    let type = '';

    // FIX: Theme Toggle Logic
    themeBtn.onclick = () => {
        const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
    };

    // FIX: Click Trigger
    dz.addEventListener('click', () => fi.click());

    fi.addEventListener('change', (e) => {
        activeFile = e.target.files[0];
        if(!activeFile) return;

        const mime = activeFile.type;
        if(mime.startsWith('image')) type = 'image';
        else if(mime.startsWith('video')) type = 'video';
        else if(mime.startsWith('audio')) type = 'audio';
        else type = 'docs';

        document.getElementById('status-text').innerText = "SELECTED: " + activeFile.name;
        document.getElementById('settings').style.display = 'block';

        const list = formats[type] || formats.image;
        document.getElementById('format-select').innerHTML = list
            .map(f => `<option value="${f}">${f.toUpperCase()}</option>`).join('');
    });

    document.getElementById('convert-btn').onclick = async () => {
        const target = document.getElementById('format-select').value;
        const log = document.getElementById('log-box');
        log.style.display = 'block';
        log.innerHTML = `> INITIALIZING...`;

        try {
            if(type === 'image') {
                log.innerHTML += `<br>> LOADING MAGICK...`;
                await initializeImageMagick();
                const bytes = new Uint8Array(await activeFile.arrayBuffer());
                const fKey = target.charAt(0).toUpperCase() + target.slice(1).replace('jpg', 'Jpeg');

                ImageMagick.read(bytes, (img) => {
                    img.write(data => {
                        const blob = new Blob([data], { type: `image/${target}` });
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        a.download = `converted.${target}`;
                        a.click();
                        log.innerHTML += `<br>> DONE!`;
                    }, MagickFormat[fKey] || MagickFormat.Png);
                });
            } else {
                log.innerHTML += `<br>> LOADING FFMPEG...`;
                if(!ffmpeg.isLoaded()) await ffmpeg.load();
                ffmpeg.FS('writeFile', 'in', await fetchFile(activeFile));
                await ffmpeg.run('-i', 'in', `out.${target}`);
                const data = ffmpeg.FS('readFile', `out.${target}`);
                const blob = new Blob([data.buffer]);
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `converted.${target}`;
                a.click();
                log.innerHTML += `<br>> DONE!`;
            }
        } catch (err) {
            log.innerHTML += `<br>> ERROR: ${err.message}`;
        }
    };
</script>
</body>
</html>
