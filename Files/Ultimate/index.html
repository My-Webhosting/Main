<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyWeb | Convert To It Edition</title>
    
    <script src="./coi-serviceworker.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    
    <style>
        :root { --bg: #050505; --card: #111; --accent: #00ff88; --border: #222; --text: #eee; }
        [data-theme="light"] { --bg: #f5f5f7; --card: #fff; --accent: #0071e3; --border: #d2d2d7; --text: #1d1d1f; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; transition: 0.3s; }
        
        /* --- UI Shell --- */
        nav { padding: 1.5rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo { font-weight: 900; letter-spacing: -1px; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
        
        .container { max-width: 900px; margin: 60px auto; padding: 0 20px; }
        .main-card { background: var(--card); border: 1px solid var(--border); border-radius: 32px; padding: 50px; position: relative; overflow: hidden; }
        
        /* --- Formats Grid --- */
        .drop-zone { border: 2px dashed var(--border); border-radius: 20px; padding: 80px 20px; text-align: center; cursor: pointer; transition: 0.2s; }
        .drop-zone:hover { border-color: var(--accent); background: rgba(0, 255, 136, 0.03); }
        
        .selector-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .pro-input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 20px; border-radius: 16px; font-weight: 700; outline: none; appearance: none; cursor: pointer; }
        
        .terminal { background: #000; color: var(--accent); font-family: 'JetBrains Mono', monospace; padding: 30px; border-radius: 16px; font-size: 0.8rem; margin-top: 25px; min-height: 250px; border: 1px solid #1a1a1a; }
        
        .btn-action { background: var(--accent); color: #000; border: none; padding: 22px; border-radius: 16px; font-weight: 800; width: 100%; cursor: pointer; margin-top: 20px; font-size: 1rem; text-transform: uppercase; }
        .btn-action:disabled { opacity: 0.2; cursor: not-allowed; }

        .version-tag { position: fixed; bottom: 20px; right: 20px; font-family: 'JetBrains Mono'; font-size: 0.7rem; color: var(--accent); opacity: 0.6; }
    </style>
</head>
<body>

<nav>
    <div class="logo"><img src="MYWEB2!.png" height="30"> MYWEB CONVERT</div>
    <div style="font-size: 0.8rem; font-weight: 800; opacity: 0.5;">POWERED BY WASM</div>
</nav>

<div class="container">
    <div class="main-card">
        <div id="step-1">
            <div class="drop-zone" onclick="document.getElementById('fileIn').click()">
                <h1 id="file-label">SELECT SOURCE BINARY</h1>
                <p style="opacity: 0.5; margin-top: 10px;">Supporting Images, Video, Audio & Documents</p>
                <input type="file" id="fileIn" hidden>
            </div>
        </div>

        <div id="step-2" style="display:none;">
            <div class="selector-grid">
                <div>
                    <label style="font-size:0.7rem; font-weight:800; margin-bottom:10px; display:block;">DETECTED CORE</label>
                    <div id="core-badge" class="pro-input" style="color:var(--accent)">AUTO-DETECTING...</div>
                </div>
                <div>
                    <label style="font-size:0.7rem; font-weight:800; margin-bottom:10px; display:block;">TARGET FORMAT</label>
                    <select id="format-out" class="pro-input" style="width:100%"></select>
                </div>
            </div>
            <button class="btn-action" id="convert-btn">Initiate Transformation</button>
        </div>

        <div id="step-3" style="display:none;">
            <div class="terminal" id="logger">> SYSTEM_READY...</div>
            <button class="btn-action" onclick="location.reload()" style="background:var(--border); color:var(--text);">New Process</button>
        </div>
    </div>
</div>

<div class="version-tag">STABLE v1.4.0 // PORTAL_RUNNER_STYLE</div>

<script type="module">
    import { initializeImageMagick, ImageMagick, MagickFormat } from 'https://cdn.jsdelivr.net/npm/@imagemagick/magick-wasm@0.0.30/dist/index.mjs';

    // THE MASSIVE FORMAT MATRIX
    const FORMAT_MATRIX = {
        image: ["png", "jpg", "jpeg", "webp", "gif", "ico", "bmp", "tiff", "tga", "avif", "pdf", "heic", "psd", "eps"],
        video: ["mp4", "webm", "avi", "mov", "mkv", "wmv", "flv", "ogv", "3gp"],
        audio: ["mp3", "wav", "ogg", "flac", "m4a", "aac", "opus", "aiff"],
        docs: ["docx", "odt", "html", "txt", "pdf", "rtf"]
    };

    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: true, corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js' });

    let activeFile = null;
    let activeCore = '';
    const log = document.getElementById('logger');

    document.getElementById('fileIn').onchange = (e) => {
        activeFile = e.target.files[0];
        if(!activeFile) return;

        const mime = activeFile.type;
        const ext = activeFile.name.split('.').pop().toLowerCase();
        
        // Match the core
        if(mime.startsWith('image') || ["psd", "tga", "heic"].includes(ext)) activeCore = 'image';
        else if(mime.startsWith('video')) activeCore = 'video';
        else if(mime.startsWith('audio')) activeCore = 'audio';
        else activeCore = 'docs';

        document.getElementById('core-badge').innerText = activeCore.toUpperCase();
        document.getElementById('step-1').style.display = 'none';
        document.getElementById('step-2').style.display = 'block';

        const targets = FORMAT_MATRIX[activeCore] || FORMAT_MATRIX.image;
        document.getElementById('format-out').innerHTML = targets
            .filter(t => t !== ext)
            .map(t => `<option value="${t}">${t.toUpperCase()}</option>`).join('');
    };

    document.getElementById('convert-btn').onclick = async () => {
        const target = document.getElementById('format-out').value;
        document.getElementById('step-2').style.display = 'none';
        document.getElementById('step-3').style.display = 'block';

        try {
            if(activeCore === 'image') {
                log.innerHTML += `<br>> BOOTING MAGICK_WASM...`;
                await initializeImageMagick();
                const bytes = new Uint8Array(await activeFile.arrayBuffer());
                const formatKey = target.charAt(0).toUpperCase() + target.slice(1).replace('jpg', 'Jpeg');
                
                ImageMagick.read(bytes, (image) => {
                    image.write(data => {
                        save(new Blob([data]), `converted.${target}`);
                        log.innerHTML += `<br>> SUCCESS: RENDER_FINISHED.`;
                    }, MagickFormat[formatKey] || MagickFormat.Png);
                });
            } else {
                log.innerHTML += `<br>> BOOTING FFMPEG_CORE...`;
                if(!ffmpeg.isLoaded()) await ffmpeg.load();
                ffmpeg.FS('writeFile', 'src', await fetchFile(activeFile));
                await ffmpeg.run('-i', 'src', `out.${target}`);
                const data = ffmpeg.FS('readFile', `out.${target}`);
                save(new Blob([data.buffer]), `converted.${target}`);
                log.innerHTML += `<br>> SUCCESS: TRANSCODE_FINISHED.`;
            }
        } catch(err) {
            log.innerHTML += `<br>> !! CRITICAL_FAILURE: ${err.message}`;
        }
    };

    function save(blob, name) {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = name;
        a.click();
    }
</script>
</body>
</html>
