<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyWeb | Ultimate Converter</title>
    
    <script src="./coi-serviceworker.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        :root { 
            --bg: #ffffff; 
            --card: #f9fafb; 
            --txt: #111827; 
            --accent: #2563eb; 
            --border: #e5e7eb; 
            --nav-txt: #4b5563;
        }
        [data-theme="dark"] { 
            --bg: #000000; 
            --card: #0a0a0a; 
            --txt: #f9fafb; 
            --accent: #3b82f6; 
            --border: #1f2937; 
            --nav-txt: #9ca3af;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--txt); transition: 0.25s; min-height: 100vh; display: flex; flex-direction: column; }

        /* --- Updated MyWeb Nav Bar --- */
        nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 1.25rem 10%; 
            background: var(--bg); 
            border-bottom: 1px solid var(--border); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }
        .nav-left img { height: 32px; cursor: pointer; }
        
        .nav-right { display: flex; align-items: center; gap: 24px; }
        .nav-link { 
            text-decoration: none; 
            color: var(--nav-txt); 
            font-size: 0.9rem; 
            font-weight: 600; 
            transition: color 0.2s;
        }
        .nav-link:hover { color: var(--accent); }

        .theme-btn { 
            background: none; 
            border: none; 
            cursor: pointer; 
            font-size: 1.2rem; 
            color: var(--txt); 
            padding: 4px;
            display: flex;
            align-items: center;
        }

        /* --- Converter UI --- */
        .main-container { flex: 1; max-width: 650px; margin: 60px auto; padding: 0 24px; width: 100%; }
        
        .hero-section { text-align: center; margin-bottom: 32px; }
        .hero-section h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.05em; margin-bottom: 8px; }
        .hero-section p { color: var(--nav-txt); font-size: 1rem; }

        .app-card { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 24px; 
            padding: 40px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); 
        }
        
        .drop-area { 
            border: 2px dashed var(--border); 
            border-radius: 16px; 
            padding: 60px 20px; 
            text-align: center; 
            cursor: pointer; 
            background: var(--bg); 
            transition: 0.2s;
            position: relative;
        }
        .drop-area:hover { border-color: var(--accent); }
        #fileInput { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 10; }

        .config-box { margin-top: 32px; display: none; }
        .field-label { display: block; font-size: 0.7rem; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 0.1em; }
        
        select { 
            width: 100%; 
            padding: 16px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            background: var(--bg); 
            color: var(--txt); 
            font-weight: 700; 
            margin-bottom: 24px;
            outline: none;
            cursor: pointer;
        }

        .btn-main { 
            width: 100%; 
            padding: 18px; 
            border-radius: 12px; 
            font-weight: 800; 
            cursor: pointer; 
            border: none; 
            background: var(--accent); 
            color: white; 
            text-transform: uppercase;
            transition: 0.2s;
        }
        .btn-main:hover { opacity: 0.9; }
        
        .output-console { 
            background: #000; 
            color: #10b981; 
            padding: 20px; 
            border-radius: 12px; 
            font-family: monospace; 
            font-size: 0.8rem; 
            margin-top: 24px; 
            display: none; 
            border: 1px solid #111;
        }

        .version-info { text-align: center; margin-top: 40px; font-size: 0.65rem; font-weight: 800; color: var(--nav-txt); text-transform: uppercase; letter-spacing: 0.3em; opacity: 0.4; }
    </style>
</head>
<body>

<nav>
    <div class="nav-left">
      <a href="https://my-webhosting.github.io/Main/">  <img id="logo" src="MYWEB2!.png" alt="MyWeb" "></a>
    </div>
    
    <div class="nav-right">
        <a href="https://my-webhosting.github.io/Main/" class="nav-link">Home</a>
        <a href="https://my-webhosting.github.io/Main/Files/JIMG" class="nav-link">JackImage Studio</a>
        <button id="theme-toggle" class="theme-btn">🌓</button>
    </div>
</nav>

<div class="main-container">
    <div class="hero-section">
        <h1>Ultimate Converter</h1>
        <p>Advanced media processing for the MyWeb suite.</p>
    </div>

    <div class="app-card">
        <div class="drop-area">
            <h3 id="status-display" style="font-weight: 800;">Drop or Select File</h3>
            <p style="font-size: 0.8rem; color: var(--nav-txt); margin-top: 6px;">Images • Video • Audio • ZIP</p>
            <input type="file" id="fileInput">
        </div>

        <div id="controls" class="config-box">
            <label class="field-label">Export Format</label>
            <select id="format-select"></select>
            <button id="convert-btn" class="btn-main">Start Conversion</button>
        </div>

        <div id="log-box" class="output-console"></div>
    </div>
    
    <div class="version-info">Build v1.6.1 | MyWeb Ecosystem</div>
</div>

<script>
    // --- UI ENGINE ---
    const html = document.documentElement;
    const logo = document.getElementById('logo');
    const themeBtn = document.getElementById('theme-toggle');

    themeBtn.onclick = () => {
        const isDark = html.getAttribute('data-theme') === 'dark';
        const next = isDark ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        logo.src = (next === 'light') ? 'MYWEB!.png' : 'MYWEB2!.png';
    };

    // --- CONVERSION ENGINE ---
    const FORMATS = {
        image: ["png", "jpg", "webp", "bmp", "zip"],
        video: ["mp4", "webm", "avi", "mov", "mp3", "zip"],
        audio: ["mp3", "wav", "ogg", "flac", "zip"],
        other: ["zip"]
    };

    let activeFile = null;

    document.getElementById('fileInput').onchange = (e) => {
        activeFile = e.target.files[0];
        if(!activeFile) return;

        const ext = activeFile.name.split('.').pop().toLowerCase();
        let type = 'other';
        
        if (["png", "jpg", "jpeg", "webp", "bmp", "gif"].includes(ext)) type = 'image';
        else if (["mp4", "webm", "avi", "mov", "mkv"].includes(ext)) type = 'video';
        else if (["mp3", "wav", "ogg", "flac", "m4a"].includes(ext)) type = 'audio';

        document.getElementById('status-display').innerText = activeFile.name.toUpperCase();
        document.getElementById('controls').style.display = 'block';

        const sel = document.getElementById('format-select');
        sel.innerHTML = FORMATS[type]
            .filter(f => f !== ext)
            .map(f => `<option value="${f}">${f.toUpperCase()} ${f==='zip' ? '(ARCHIVE)' : ''}</option>`)
            .join('');
    };

    document.getElementById('convert-btn').onclick = async () => {
        const target = document.getElementById('format-select').value;
        const log = document.getElementById('log-box');
        log.style.display = 'block';
        log.innerHTML = `> MOUNTING MODULES...`;

        try {
            if (target === 'zip') {
                log.innerHTML += `<br>> PACKAGING ZIP...`;
                const zip = new JSZip();
                zip.file(activeFile.name, activeFile);
                const content = await zip.generateAsync({type:"blob"});
                download(content, `${activeFile.name}.zip`);
                log.innerHTML += `<br>> DONE.`;
            } 
            else if (FORMATS.image.includes(target)) {
                log.innerHTML += `<br>> RENDERING IMAGE...`;
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    canvas.getContext('2d').drawImage(img, 0, 0);
                    canvas.toBlob((blob) => {
                        download(blob, `export.${target}`);
                        log.innerHTML += `<br>> SUCCESS.`;
                    }, `image/${target === 'jpg' ? 'jpeg' : target}`);
                };
                img.src = URL.createObjectURL(activeFile);
            }
            else {
                log.innerHTML += `<br>> BOOTING FFMPEG...`;
                const { createFFmpeg, fetchFile } = FFmpeg;
                const ffmpeg = createFFmpeg({ log: true });
                await ffmpeg.load();
                ffmpeg.FS('writeFile', 'in', await fetchFile(activeFile));
                await ffmpeg.run('-i', 'in', `out.${target}`);
                const data = ffmpeg.FS('readFile', `out.${target}`);
                download(new Blob([data.buffer]), `export.${target}`);
                log.innerHTML += `<br>> EXPORT COMPLETE.`;
            }
        } catch (err) {
            log.innerHTML += `<br>> ERROR: ${err.message}`;
        }
    };

    function download(blob, name) {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = name;
        a.click();
    }
</script>
</body>
</html>
