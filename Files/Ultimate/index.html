<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyWeb | Ultimate Converter</title>
    
    <script src="./coi-serviceworker.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    
    <style>
        :root { --bg: #ffffff; --card: #f8fafc; --txt: #000000; --accent: #2563eb; --border: #e2e8f0; }
        [data-theme="dark"] { --bg: #000000; --card: #0a0a0a; --txt: #ffffff; --accent: #3b82f6; --border: #1a1a1a; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--txt); transition: 0.2s; min-height: 100vh; }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 8%; background: var(--bg); border-bottom: 1px solid var(--border); }
        .nav-brand img { height: 38px; cursor: pointer; }

        .wrapper { max-width: 600px; margin: 60px auto; padding: 0 20px; }
        .main-card { background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        
        .upload-zone { border: 2px dashed var(--border); border-radius: 20px; padding: 60px 20px; text-align: center; cursor: pointer; position: relative; background: var(--bg); }
        #fileInput { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; z-index: 100; }

        .settings-area { margin-top: 30px; display: none; }
        select { width: 100%; padding: 18px; border-radius: 14px; border: 1px solid var(--border); background: var(--bg); color: var(--txt); font-weight: 700; margin-bottom: 20px; outline: none; appearance: none; cursor: pointer; }

        .btn-convert { width: 100%; padding: 20px; border-radius: 14px; font-weight: 900; cursor: pointer; border: none; background: var(--accent); color: white; text-transform: uppercase; }
        
        .console { background: #000; color: #4ade80; padding: 20px; border-radius: 14px; font-family: monospace; font-size: 0.8rem; margin-top: 20px; display: none; border: 1px solid #222; }
        .version-tag { width: 100%; text-align: center; font-size: 0.6rem; font-weight: 800; color: #444; margin-top: 25px; letter-spacing: 2px; }
    </style>
</head>
<body>

<nav>
    <div class="nav-brand">
        <img id="logo" src="MYWEB2!.png" onclick="location.reload()">
    </div>
    <button id="theme-toggle" style="background:none; border:none; cursor:pointer; font-size:1.6rem;">🌓</button>
</nav>

<div class="wrapper">
    <div class="main-card">
        <div class="upload-zone">
            <h2 id="status-text" style="font-weight: 900;">SELECT SOURCE</h2>
            <p style="opacity: 0.5; font-size: 0.75rem;">Images, Video, Audio</p>
            <input type="file" id="fileInput">
        </div>

        <div id="settings" class="settings-area">
            <label style="font-size: 0.7rem; font-weight: 900; color: var(--accent); display: block; margin-bottom: 8px;">TARGET FORMAT</label>
            <select id="format-select"></select>
            <button id="convert-btn" class="btn-convert">Start Export</button>
        </div>

        <div id="log-box" class="console"></div>
    </div>
    <div class="version-tag">STABLE v1.5.7 | TRUE BLACK CORE</div>
</div>

<script>
    // --- UI LOGIC (Safe Block) ---
    const doc = document.documentElement;
    const logoImg = document.getElementById('logo');
    
    document.getElementById('theme-toggle').onclick = () => {
        const isDark = doc.getAttribute('data-theme') === 'dark';
        const next = isDark ? 'light' : 'dark';
        doc.setAttribute('data-theme', next);
        logoImg.src = (next === 'light') ? 'MYWEB!.png' : 'MYWEB2!.png';
    };

    // --- FILE HANDLING & FORMAT SELECTION ---
    const library = {
        image: ["png", "jpg", "webp", "gif", "ico", "bmp"],
        video: ["mp4", "webm", "avi", "mov"],
        audio: ["mp3", "wav", "ogg", "flac"]
    };

    let activeFile = null;

    document.getElementById('fileInput').onchange = (e) => {
        activeFile = e.target.files[0];
        if(!activeFile) return;

        const ext = activeFile.name.split('.').pop().toLowerCase();
        let cat = 'image';
        
        if(["mp4", "webm", "avi", "mov"].includes(ext)) cat = 'video';
        else if(["mp3", "wav", "ogg", "flac"].includes(ext)) cat = 'audio';

        document.getElementById('status-text').innerText = activeFile.name.toUpperCase();
        document.getElementById('settings').style.display = 'block';

        const sel = document.getElementById('format-select');
        sel.innerHTML = library[cat]
            .filter(f => f !== ext)
            .map(f => `<option value="${f}">${f.toUpperCase()}</option>`)
            .join('');
    };

    // --- CONVERSION LOGIC ---
    document.getElementById('convert-btn').onclick = async () => {
        const target = document.getElementById('format-select').value;
        const log = document.getElementById('log-box');
        log.style.display = 'block';
        log.innerHTML = `> MOUNTING ENGINES...`;

        try {
            if (library.image.includes(target)) {
                log.innerHTML += `<br>> IMAGE RENDERING NOT SUPPORTED WITHOUT WASM...`;
                // Note: Standard JS cannot easily convert images without a loaded WASM engine.
                // We would need a working ImageMagick build here.
            } else {
                log.innerHTML += `<br>> BOOTING FFmpeg...`;
                const { createFFmpeg, fetchFile } = FFmpeg;
                const ffmpeg = createFFmpeg({ log: true });
                await ffmpeg.load();
                ffmpeg.FS('writeFile', 'in', await fetchFile(activeFile));
                await ffmpeg.run('-i', 'in', `out.${target}`);
                const data = ffmpeg.FS('readFile', `out.${target}`);
                
                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob([data.buffer]));
                a.download = `myweb_conv.${target}`;
                a.click();
                log.innerHTML += `<br>> MEDIA READY`;
            }
        } catch (err) {
            log.innerHTML += `<br>> ERROR: ${err.message}`;
        }
    };
</script>
</body>
</html>
